<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Visual Mapper</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
        .font-mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body class="flex flex-col h-screen bg-[#fafafa] text-gray-800 font-sans overflow-hidden">

    <!-- Toast Notification System -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white text-sm font-medium px-4 py-3 rounded-lg shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4 text-blue-400"></i>
        <span id="toast-message"></span>
    </div>

    <!-- Header -->
    <header class="h-14 border-b border-gray-200 bg-white flex items-center justify-between px-4 shrink-0 select-none">
        <div class="flex items-center gap-3">
            <div class="bg-gray-900 text-white font-bold w-7 h-7 flex items-center justify-center rounded-md text-xs">
                VM
            </div>
            <div class="flex items-center gap-2 text-sm">
                <span class="text-gray-500">Tools</span>
                <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-400"></i>
                <span class="text-gray-900 font-semibold">JSON Visual Mapper</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="handleParseAll()" class="flex items-center gap-2 bg-white border border-gray-200 hover:bg-gray-50 px-4 py-1.5 rounded-full text-sm font-medium text-gray-700 transition-colors shadow-sm">
                <i data-lucide="play" class="w-3.5 h-3.5 text-gray-500"></i>
                <span>Parse All</span>
            </button>
            <button onclick="handleGenerate()" class="flex items-center gap-2 bg-[#2563eb] hover:bg-blue-700 px-5 py-1.5 rounded-full text-sm font-medium text-white transition-colors shadow-sm">
                <span>Generate Payload</span>
            </button>
            <div class="w-px h-5 bg-gray-200 mx-1"></div>
            <i data-lucide="settings" class="w-4.5 h-4.5 text-gray-400 hover:text-gray-600 cursor-pointer"></i>
        </div>
    </header>

    <!-- Main Workspace (Bento Box Layout) -->
    <main class="flex-1 overflow-hidden relative p-3 pb-0 flex gap-3">
        
        <!-- LEFT PANE: Source JSON -->
        <div class="flex-1 flex flex-col min-w-[320px] bg-white relative border border-gray-200 rounded-xl overflow-hidden shadow-[0_2px_8px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex bg-[#f8f9fa] border-b border-gray-200 min-h-[44px] px-1 items-center justify-between">
                <div class="flex items-center" id="source-tabs">
                    <button data-tab="raw" class="tab-btn active flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-900 bg-white border border-gray-200 shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
                        <i data-lucide="file-json" class="w-4 h-4 text-blue-500"></i> Source JSON
                    </button>
                    <button data-tab="tree" class="tab-btn flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-500 hover:text-gray-700 hover:bg-gray-100 border border-transparent">
                        <i data-lucide="list-tree" class="w-4 h-4 text-gray-400"></i> Visual Tree
                    </button>
                </div>
                <i data-lucide="plus" class="w-4 h-4 text-gray-400 mx-2"></i>
            </div>
            
            <div class="flex-1 overflow-hidden relative">
                <!-- Source Raw -->
                <div id="source-raw-view" class="absolute inset-0 flex">
                    <div class="relative w-full h-full bg-[#fafafa] font-mono text-[13px] leading-[21px] flex overflow-hidden">
                        <div id="source-lines" class="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-gray-400 text-right pr-3 py-4 select-none overflow-hidden" style="pointer-events: none"></div>
                        <textarea id="source-json" class="flex-1 p-4 resize-none focus:outline-none text-gray-800 bg-transparent whitespace-pre overflow-auto" spellcheck="false" style="line-height: 21px"></textarea>
                    </div>
                </div>
                <!-- Source Tree -->
                <div id="source-tree-view" class="absolute inset-0 hidden overflow-y-auto p-3 bg-[#fafafa]"></div>
            </div>
        </div>

        <!-- CENTER PANE: Mapping Canvas & Sandbox Engine -->
        <div class="flex-[1.5] flex flex-col min-w-[400px] bg-white relative border border-gray-200 rounded-xl overflow-hidden shadow-[0_2px_8px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex bg-[#f8f9fa] border-b border-gray-200 min-h-[44px] px-1 items-center justify-between z-10">
                <div class="flex items-center" id="center-tabs">
                    <button data-tab="canvas" class="tab-btn active flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-900 bg-white border border-gray-200 shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
                        <i data-lucide="git-merge" class="w-4 h-4 text-blue-500"></i> Mapping
                    </button>
                    <button data-tab="config" class="tab-btn flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-500 hover:text-gray-700 hover:bg-gray-100 border border-transparent">
                        <i data-lucide="database" class="w-4 h-4 text-gray-400"></i> Config
                    </button>
                    <button data-tab="output" class="tab-btn flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-500 hover:text-gray-700 hover:bg-gray-100 border border-transparent">
                        <i data-lucide="code-2" class="w-4 h-4 text-gray-400"></i> Output
                    </button>
                    <div class="w-px h-5 bg-gray-200 mx-1"></div>
                    <button data-tab="sandbox" class="tab-btn flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-500 hover:text-gray-700 hover:bg-gray-100 border border-transparent">
                        <i data-lucide="terminal" class="w-4 h-4 text-gray-400"></i> JS Sandbox
                    </button>
                </div>
                <i data-lucide="plus" class="w-4 h-4 text-gray-400 mx-2"></i>
            </div>
            
            <div class="flex-1 relative overflow-hidden bg-[#fafafa]">
                
                <!-- Canvas View -->
                <div id="center-canvas-view" class="absolute inset-0 flex flex-col items-center justify-center p-8 z-10">
                    <div id="canvas-empty-state" class="flex flex-col items-center justify-center text-center pointer-events-none transition-opacity">
                        <div class="w-16 h-16 rounded-2xl bg-white border border-gray-200 flex items-center justify-center mb-4 shadow-sm">
                            <i data-lucide="git-merge" class="w-7 h-7 text-gray-400"></i>
                        </div>
                        <h3 class="text-[15px] font-semibold text-gray-800 mb-2">Connect Fields</h3>
                        <p class="text-[13px] text-gray-500 max-w-xs">Select a field from the Source tree and a field from the Target tree to map them.</p>
                    </div>
                    
                    <div id="canvas-mappings" class="mt-8 w-full max-w-sm hidden">
                        <div class="flex items-center justify-between mb-2">
                            <div class="text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">
                                Active Mappings (<span id="mapping-count">0</span>)
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="clearMappings()" class="text-[11px] font-medium text-gray-500 hover:text-rose-600 px-2 py-1 transition-colors">
                                    Clear All
                                </button>
                                <button onclick="handleCopyConfig()" class="flex items-center gap-1.5 text-[11px] font-medium text-blue-600 hover:text-blue-700 bg-blue-50 px-2 py-1 rounded transition-colors" title="Copy mapping configuration as JSON array">
                                    <i data-lucide="copy" class="w-3 h-3" id="copy-icon"></i>
                                    <span id="copy-text">Copy Config</span>
                                </button>
                            </div>
                        </div>
                        <div id="mappings-list" class="flex flex-col gap-2 max-h-60 overflow-y-auto pr-2">
                            <!-- Mappings injected via JS -->
                        </div>
                    </div>
                </div>

                <!-- Config View -->
                <div id="center-config-view" class="absolute inset-0 hidden">
                    <div class="relative w-full h-full bg-[#fafafa] font-mono text-[13px] leading-[21px] flex overflow-hidden">
                        <div id="config-lines" class="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-gray-400 text-right pr-3 py-4 select-none overflow-hidden"></div>
                        <textarea id="config-json" class="flex-1 p-4 resize-none focus:outline-none text-gray-800 bg-transparent whitespace-pre overflow-auto" readonly placeholder="[\n  // Active mapping configuration will appear here...\n]" spellcheck="false" style="line-height: 21px"></textarea>
                    </div>
                </div>

                <!-- Output View -->
                <div id="center-output-view" class="absolute inset-0 hidden">
                    <div class="relative w-full h-full bg-[#fafafa] font-mono text-[13px] leading-[21px] flex overflow-hidden">
                        <div id="output-lines" class="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-gray-400 text-right pr-3 py-4 select-none overflow-hidden"></div>
                        <textarea id="output-json" class="flex-1 p-4 resize-none focus:outline-none text-gray-800 bg-transparent whitespace-pre overflow-auto" readonly placeholder="// Generated payload will appear here..." spellcheck="false" style="line-height: 21px"></textarea>
                    </div>
                </div>

                <!-- Sandbox View -->
                <div id="center-sandbox-view" class="absolute inset-0 hidden flex-col relative">
                    <div class="flex-1 flex flex-col min-h-0 border-b border-gray-200">
                        <div class="bg-white px-3 py-1.5 flex items-center justify-between border-b border-gray-200 shrink-0 shadow-sm z-10">
                            <div>
                                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider block">JavaScript Execution Engine</span>
                                <span class="text-[10px] text-gray-400">Map the global <code>sourceData</code> object</span>
                            </div>
                            <button onclick="loadActiveConfigIntoSandbox()" class="text-[11px] font-medium text-blue-600 border border-blue-200 hover:bg-blue-50 px-2 py-1 rounded transition-colors">
                                Generate Setup
                            </button>
                        </div>
                        <div class="flex-1 relative bg-[#fafafa] flex overflow-hidden font-mono text-[13px] leading-[21px]">
                             <div id="sandbox-lines" class="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-gray-400 text-right pr-3 py-4 select-none overflow-hidden"></div>
                             <textarea id="sandbox-code" class="flex-1 p-4 resize-none focus:outline-none text-gray-800 bg-transparent whitespace-pre overflow-auto" placeholder="// Write or load JavaScript transformation code here..." spellcheck="false" style="line-height: 21px"></textarea>
                        </div>
                    </div>
                    
                    <div class="h-14 bg-[#f8f9fa] flex items-center justify-center border-b border-gray-200 shrink-0 shadow-sm z-10">
                        <button onclick="handleSandboxRun()" class="flex items-center gap-2 bg-emerald-500 text-white px-6 py-2 rounded-full hover:bg-emerald-600 text-xs font-bold transition-all shadow-sm transform hover:scale-105">
                            <i data-lucide="play" class="w-3.5 h-3.5 fill-current"></i> Execute Script
                        </button>
                    </div>
                    
                    <div class="flex-1 flex flex-col min-h-0">
                        <div class="bg-white px-3 py-1.5 border-b border-gray-200 shrink-0 shadow-sm z-10">
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Output: Generated JSON</span>
                        </div>
                        <div class="flex-1 relative bg-[#fafafa] flex overflow-hidden font-mono text-[13px] leading-[21px]">
                             <div id="test-output-lines" class="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-gray-400 text-right pr-3 py-4 select-none overflow-hidden"></div>
                             <textarea id="test-output-json" class="flex-1 p-4 resize-none focus:outline-none text-gray-800 bg-transparent whitespace-pre overflow-auto" readonly placeholder="// Transformation result will appear here..." spellcheck="false" style="line-height: 21px"></textarea>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- RIGHT PANE: Target JSON -->
        <div class="flex-1 flex flex-col min-w-[320px] bg-white relative border border-gray-200 rounded-xl overflow-hidden shadow-[0_2px_8px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex bg-[#f8f9fa] border-b border-gray-200 min-h-[44px] px-1 items-center justify-between">
                <div class="flex items-center" id="target-tabs">
                    <button data-tab="raw" class="tab-btn active flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-900 bg-white border border-gray-200 shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
                        <i data-lucide="layout-template" class="w-4 h-4 text-blue-500"></i> DTO
                    </button>
                    <button data-tab="tree" class="tab-btn flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-500 hover:text-gray-700 hover:bg-gray-100 border border-transparent">
                        <i data-lucide="list-tree" class="w-4 h-4 text-gray-400"></i> Visual Tree
                    </button>
                </div>
                <i data-lucide="plus" class="w-4 h-4 text-gray-400 mx-2"></i>
            </div>
            
            <div class="flex-1 overflow-hidden relative">
                 <!-- Target Raw -->
                 <div id="target-raw-view" class="absolute inset-0 flex">
                    <div class="relative w-full h-full bg-[#fafafa] font-mono text-[13px] leading-[21px] flex overflow-hidden">
                        <div id="target-lines" class="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-gray-400 text-right pr-3 py-4 select-none overflow-hidden" style="pointer-events: none"></div>
                        <textarea id="target-json" class="flex-1 p-4 resize-none focus:outline-none text-gray-800 bg-transparent whitespace-pre overflow-auto" spellcheck="false" style="line-height: 21px"></textarea>
                    </div>
                </div>
                <!-- Target Tree -->
                <div id="target-tree-view" class="absolute inset-0 hidden overflow-y-auto p-3 bg-[#fafafa]"></div>
            </div>
        </div>

    </main>
    
    <!-- Footer -->
    <footer class="h-8 border-t border-gray-200 bg-[#fafafa] flex items-center justify-between px-4 text-[11px] font-medium text-gray-500 select-none">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1.5 hover:text-gray-800 cursor-pointer">
                <i data-lucide="terminal" class="w-3.5 h-3.5"></i>
                <span>Console</span>
            </div>
        </div>
        <div class="flex items-center gap-5">
            <span><span id="footer-mapping-count">0</span> Mappings Active</span>
            <span>UTF-8</span>
            <span class="flex items-center gap-1.5 text-gray-700">
                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                Vanilla JS Environment
            </span>
        </div>
    </footer>

    <!-- Application Logic -->
    <script>
        // --- State Management ---
        const state = {
            sourceJson: `{\n  "bookingPlatform": {\n    "platformId": "TRV-ENT-90821",\n    "generatedAt": "2026-03-11T09:15:22Z",\n    "trip": {\n      "tripId": "TRIP-772991",\n      "status": "confirmed",\n      "purpose": "business-conference",\n      "travelers": [\n        {\n          "travelerId": "EMP-9912",\n          "profile": {\n            "name": "Rahul Sharma",\n            "department": "Engineering"\n          }\n        }\n      ],\n      "itinerary": {\n        "flights": [\n          {\n            "airline": {\n              "name": "Air India"\n            },\n            "flightNumber": "AI302",\n            "departure": {\n              "airport": "BOM",\n              "city": "Mumbai"\n            },\n            "arrival": {\n              "airport": "SIN",\n              "city": "Singapore"\n            },\n            "cabin": "business"\n          }\n        ],\n        "hotels": [\n          {\n            "hotel": {\n              "name": "Marina Bay Grand Hotel"\n            },\n            "stay": {\n              "checkIn": "2026-04-04",\n              "checkOut": "2026-04-08",\n              "roomType": "executive-suite"\n            }\n          }\n        ]\n      },\n      "pricing": {\n        "currency": "USD",\n        "total": 2726.55\n      }\n    }\n  }\n}`,
            targetJson: `{\n  "expenseReport": {\n    "employeeId": "",\n    "employeeName": "",\n    "travelReason": "",\n    "costDetails": {\n      "amount": 0,\n      "currencyCode": ""\n    },\n    "flightInfo": {\n      "carrier": "",\n      "origin": "",\n      "destination": ""\n    }\n  }\n}`,
            sourcePaths: [],
            targetPaths: [],
            activeSourceTab: 'raw',
            activeTargetTab: 'raw',
            activeCenterTab: 'canvas',
            selectedSource: null,
            selectedTarget: null,
            mappings: [],
            outputJson: '',
            sandboxCode: '// Click "Generate Setup" to translate visual mappings into JS Code.\n// Or write custom JS here to process the payload!\n\nfunction mapData(backendData) {\n  return {\n    // your mapping logic\n  };\n}\n\nreturn mapData(sourceData);',
            testOutputJson: '',
            editingMappingId: null,
            editSource: '',
            editTarget: ''
        };

        // --- Utility Functions ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        const flattenJSON = (obj, prefix = '', paths = []) => {
            if (obj === null || typeof obj !== 'object') return paths;

            if (Array.isArray(obj)) {
                obj.forEach((item, index) => {
                    const newPath = `${prefix}[${index}]`;
                    const isItemArray = Array.isArray(item);
                    const isItemObject = typeof item === 'object' && item !== null && !isItemArray;

                    paths.push({
                        path: newPath,
                        key: `[${index}]`,
                        type: isItemArray ? 'array' : typeof item,
                        isLeaf: !isItemArray && !isItemObject,
                    });

                    if (isItemObject || isItemArray) {
                        flattenJSON(item, newPath, paths);
                    }
                });
                return paths;
            }

            for (const key in obj) {
                if (Object.prototype.hasOwnProperty.call(obj, key)) {
                    const newPath = prefix ? `${prefix}.${key}` : key;
                    const value = obj[key];
                    const isArray = Array.isArray(value);
                    const isObject = typeof value === 'object' && value !== null && !isArray;
                    
                    paths.push({
                        path: newPath,
                        key: key,
                        type: isArray ? 'array' : typeof value,
                        isLeaf: !isArray && !isObject,
                    });
                    
                    if (isArray || isObject) {
                        flattenJSON(value, newPath, paths);
                    }
                }
            }
            return paths;
        };

        const transformData = (srcObj, mappingsArray) => {
            let outObj = {};
            
            const getVal = (obj, path) => {
                const normalizedPath = path.replace(/\[(\d+)\]/g, '.$1');
                return normalizedPath.split('.').filter(Boolean).reduce((curr, part) => curr ? curr[part] : undefined, obj);
            };
            
            const setVal = (obj, path, val) => {
                const parts = path.replace(/\[(\d+)\]/g, '.$1').split('.').filter(Boolean);
                let curr = outObj;
                for (let i = 0; i < parts.length - 1; i++) {
                    const part = parts[i];
                    const nextPart = parts[i + 1];
                    
                    if (!curr[part]) {
                        curr[part] = /^\d+$/.test(nextPart) ? [] : {};
                    }
                    curr = curr[part];
                }
                curr[parts[parts.length - 1]] = val;
            };

            const castValue = (val, type) => {
                if (val === null || val === undefined || type === 'unknown') return val;
                switch(type) {
                    case 'string': return typeof val === 'object' ? JSON.stringify(val) : String(val);
                    case 'number': { const num = Number(val); return isNaN(num) ? val : num; }
                    case 'boolean': return typeof val === 'string' ? (val.toLowerCase() === 'true' || val === '1') : Boolean(val);
                    case 'array': return Array.isArray(val) ? val : [val];
                    default: return val;
                }
            };

            mappingsArray.forEach(m => {
                let val = getVal(srcObj, m.source);
                if (val !== undefined) {
                    val = castValue(val, m.targetType);
                    setVal(outObj, m.target, val);
                }
            });

            return outObj;
        };

        // --- DOM Elements & Event Listeners ---
        const els = {
            sourceJson: document.getElementById('source-json'),
            sourceLines: document.getElementById('source-lines'),
            targetJson: document.getElementById('target-json'),
            targetLines: document.getElementById('target-lines'),
            configJson: document.getElementById('config-json'),
            configLines: document.getElementById('config-lines'),
            outputJson: document.getElementById('output-json'),
            outputLines: document.getElementById('output-lines'),
            sandboxCode: document.getElementById('sandbox-code'),
            sandboxLines: document.getElementById('sandbox-lines'),
            testOutputJson: document.getElementById('test-output-json'),
            testOutputLines: document.getElementById('test-output-lines'),
            
            sourceTreeView: document.getElementById('source-tree-view'),
            targetTreeView: document.getElementById('target-tree-view'),
            mappingsList: document.getElementById('mappings-list'),
            
            canvasEmptyState: document.getElementById('canvas-empty-state'),
            canvasMappings: document.getElementById('canvas-mappings'),
            mappingCount: document.getElementById('mapping-count'),
            footerMappingCount: document.getElementById('footer-mapping-count')
        };

        function setupTextarea(textareaEl, linesEl, stateKey) {
            textareaEl.value = state[stateKey];
            const update = () => {
                state[stateKey] = textareaEl.value;
                const lines = textareaEl.value.split('\n').length || 1;
                linesEl.innerHTML = Array.from({length: Math.max(lines, 1)}).map((_, i) => `<div>${i + 1}</div>`).join('');
            };
            textareaEl.addEventListener('input', update);
            textareaEl.addEventListener('scroll', () => { linesEl.scrollTop = textareaEl.scrollTop; });
            update();
        }

        // Initialize Textareas
        setupTextarea(els.sourceJson, els.sourceLines, 'sourceJson');
        setupTextarea(els.targetJson, els.targetLines, 'targetJson');
        setupTextarea(els.sandboxCode, els.sandboxLines, 'sandboxCode');

        // Render Functions
        function renderTree(side) {
            const paths = side === 'source' ? state.sourcePaths : state.targetPaths;
            const container = side === 'source' ? els.sourceTreeView : els.targetTreeView;
            const selectedPath = side === 'source' ? state.selectedSource : state.selectedTarget;

            if (!paths || paths.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <i data-lucide="list-tree" class="w-8 h-8 mb-2 opacity-20"></i>
                        <p class="text-sm">No data parsed</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            let html = '';
            paths.forEach(node => {
                const indent = (node.path.split('.').length - 1) * 16;
                const isSelected = selectedPath === node.path;
                
                let icon = 'circle', color = 'text-gray-400';
                if (node.type === 'object') { icon = 'braces'; color = 'text-blue-500'; }
                else if (node.type === 'array') { icon = 'brackets'; color = 'text-purple-500'; }
                else if (node.type === 'string') { icon = 'type'; color = 'text-emerald-500'; }
                else if (node.type === 'number') { icon = 'hash'; color = 'text-amber-500'; }
                else if (node.type === 'boolean') { icon = 'toggle-left'; color = 'text-rose-500'; }

                const bgClass = isSelected ? 'bg-blue-50/50 border-blue-200' : 'border-transparent hover:bg-gray-100';
                const textClass = isSelected ? 'text-blue-700 font-semibold' : 'text-gray-700';

                html += `
                    <div onclick="handleSelectNode('${node.path}', '${side}')" 
                         class="cursor-pointer rounded-md p-1.5 flex items-center gap-2 text-sm group border transition-colors ${bgClass}"
                         style="margin-left: ${indent}px">
                        <div class="w-3 h-3 rounded-full flex items-center justify-center ${color}">
                            <div class="w-1.5 h-1.5 rounded-full bg-current opacity-70"></div>
                        </div>
                        <span class="font-mono truncate ${textClass}">${node.key}</span>
                        ${node.isLeaf ? `<span class="ml-auto text-[10px] text-gray-400 uppercase tracking-wider px-1.5 py-0.5 bg-gray-50 rounded">${node.type}</span>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderMappings() {
            els.mappingCount.innerText = state.mappings.length;
            els.footerMappingCount.innerText = state.mappings.length;

            if (state.mappings.length === 0) {
                els.canvasEmptyState.classList.remove('hidden');
                els.canvasMappings.classList.add('hidden');
            } else {
                els.canvasEmptyState.classList.add('hidden');
                els.canvasMappings.classList.remove('hidden');
                
                let html = '';
                state.mappings.forEach(m => {
                    if (state.editingMappingId === m.id) {
                        html += `
                            <div class="flex flex-col bg-white border border-gray-200 rounded-lg p-2 shadow-sm gap-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold text-gray-400 w-12">SRC</span>
                                    <input id="edit-src-${m.id}" class="flex-1 text-xs font-mono p-1 border border-blue-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500" value="${state.editSource}">
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold text-gray-400 w-12">TARGET</span>
                                    <input id="edit-tgt-${m.id}" class="flex-1 text-xs font-mono p-1 border border-blue-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500" value="${state.editTarget}">
                                </div>
                                <div class="flex justify-end mt-1">
                                    <button onclick="saveEditing('${m.id}')" class="flex items-center gap-1 bg-blue-500 text-white text-[10px] px-2 py-1 rounded hover:bg-blue-600">
                                        <i data-lucide="check" class="w-3 h-3"></i> Save
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="flex items-center justify-between text-xs bg-white border border-gray-200 rounded-lg p-2 shadow-sm transition-all">
                                <div class="flex flex-col flex-1 truncate">
                                    <span class="font-mono text-gray-600 truncate" title="${m.source}">${m.source.split('.').pop()}</span>
                                    <span class="text-[9px] text-gray-400 uppercase tracking-wider">${m.sourceType}</span>
                                </div>
                                <i data-lucide="arrow-right" class="w-3 h-3 mx-2 text-gray-400 shrink-0"></i>
                                <div class="flex flex-col flex-1 truncate text-right">
                                    <span class="font-mono text-gray-600 truncate" title="${m.target}">${m.target.split('.').pop()}</span>
                                    <span class="text-[9px] text-gray-400 uppercase tracking-wider">${m.targetType}</span>
                                </div>
                                <div class="flex items-center ml-3 shrink-0">
                                    <button onclick="startEditing('${m.id}', '${m.source}', '${m.target}')" class="p-1 text-gray-400 hover:text-blue-500 transition-colors">
                                        <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <button onclick="deleteMapping('${m.id}')" class="p-1 text-gray-400 hover:text-rose-500 transition-colors">
                                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                });
                els.mappingsList.innerHTML = html;
                lucide.createIcons({ root: els.mappingsList });
            }

            // Sync Config view
            const configToSave = state.mappings.map(({ source, target, sourceType, targetType }) => ({ 
                source, target, sourceType: sourceType || 'unknown', targetType: targetType || 'unknown' 
            }));
            els.configJson.value = state.mappings.length > 0 ? JSON.stringify(configToSave, null, 2) : '';
            const configLinesCount = els.configJson.value.split('\n').length || 1;
            els.configLines.innerHTML = Array.from({length: Math.max(configLinesCount, 1)}).map((_, i) => `<div>${i + 1}</div>`).join('');
        }

        function updateTabStyling(containerId, activeTabName) {
            const container = document.getElementById(containerId);
            const buttons = container.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                const isActive = btn.dataset.tab === activeTabName;
                const icon = btn.querySelector('svg') || btn.querySelector('i');
                if (isActive) {
                    btn.className = 'tab-btn active flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-900 bg-white border border-gray-200 shadow-[0_1px_3px_rgba(0,0,0,0.05)]';
                    if(icon) {
                        icon.classList.remove('text-gray-400');
                        icon.classList.add('text-blue-500');
                    }
                } else {
                    btn.className = 'tab-btn flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 select-none text-gray-500 hover:text-gray-700 hover:bg-gray-100 border border-transparent';
                    if(icon) {
                        icon.classList.remove('text-blue-500');
                        icon.classList.add('text-gray-400');
                    }
                }
            });
        }

        // --- Action Handlers ---
        function handleParseAll() {
            try {
                const sParsed = JSON.parse(state.sourceJson);
                state.sourcePaths = flattenJSON(sParsed);
                switchTab('source', 'tree');
                renderTree('source');
            } catch (e) {
                showToast("Invalid Source JSON");
            }
            try {
                const tParsed = JSON.parse(state.targetJson);
                state.targetPaths = flattenJSON(tParsed);
                switchTab('target', 'tree');
                renderTree('target');
            } catch (e) {
                showToast("Invalid Target JSON");
            }
        }

        function handleSelectNode(path, side) {
            if (side === 'source') {
                state.selectedSource = state.selectedSource === path ? null : path;
            } else {
                state.selectedTarget = state.selectedTarget === path ? null : path;
            }
            
            renderTree('source');
            renderTree('target');

            if (state.selectedSource && state.selectedTarget) {
                const exists = state.mappings.some(m => m.source === state.selectedSource && m.target === state.selectedTarget);
                if (!exists) {
                    const srcNode = state.sourcePaths.find(p => p.path === state.selectedSource);
                    const tgtNode = state.targetPaths.find(p => p.path === state.selectedTarget);
                    
                    state.mappings.push({
                        id: `m-${Date.now()}`,
                        source: state.selectedSource,
                        target: state.selectedTarget,
                        sourceType: srcNode?.type || 'unknown',
                        targetType: tgtNode?.type || 'unknown'
                    });
                }
                state.selectedSource = null;
                state.selectedTarget = null;
                renderTree('source');
                renderTree('target');
                renderMappings();
            }
        }

        function switchTab(group, tabName) {
            if (group === 'source') {
                state.activeSourceTab = tabName;
                updateTabStyling('source-tabs', tabName);
                document.getElementById('source-raw-view').classList.toggle('hidden', tabName !== 'raw');
                document.getElementById('source-tree-view').classList.toggle('hidden', tabName !== 'tree');
            } else if (group === 'target') {
                state.activeTargetTab = tabName;
                updateTabStyling('target-tabs', tabName);
                document.getElementById('target-raw-view').classList.toggle('hidden', tabName !== 'raw');
                document.getElementById('target-tree-view').classList.toggle('hidden', tabName !== 'tree');
            } else if (group === 'center') {
                state.activeCenterTab = tabName;
                updateTabStyling('center-tabs', tabName);
                document.getElementById('center-canvas-view').classList.toggle('hidden', tabName !== 'canvas');
                document.getElementById('center-config-view').classList.toggle('hidden', tabName !== 'config');
                document.getElementById('center-output-view').classList.toggle('hidden', tabName !== 'output');
                document.getElementById('center-sandbox-view').classList.toggle('hidden', tabName !== 'sandbox');
                // Ensure display flex is respected for sandbox
                if (tabName === 'sandbox') {
                    document.getElementById('center-sandbox-view').style.display = 'flex';
                } else {
                    document.getElementById('center-sandbox-view').style.display = '';
                }
            }
        }

        function handleGenerate() {
            if (state.mappings.length === 0) {
                showToast("Create mappings first.");
                return;
            }
            try {
                const srcObj = JSON.parse(state.sourceJson);
                const outObj = transformData(srcObj, state.mappings);
                
                els.outputJson.value = JSON.stringify(outObj, null, 2);
                const outLinesCount = els.outputJson.value.split('\n').length || 1;
                els.outputLines.innerHTML = Array.from({length: Math.max(outLinesCount, 1)}).map((_, i) => `<div>${i + 1}</div>`).join('');
                
                switchTab('center', 'output');
            } catch (e) {
                showToast("Error generating payload. Ensure JSON is valid.");
            }
        }

        // Inline Editing
        function startEditing(id, src, tgt) {
            state.editingMappingId = id;
            state.editSource = src;
            state.editTarget = tgt;
            renderMappings();
        }

        function saveEditing(id) {
            const newSrc = document.getElementById(`edit-src-${id}`).value;
            const newTgt = document.getElementById(`edit-tgt-${id}`).value;
            state.mappings = state.mappings.map(m => m.id === id ? { ...m, source: newSrc, target: newTgt } : m);
            state.editingMappingId = null;
            renderMappings();
        }

        function deleteMapping(id) {
            state.mappings = state.mappings.filter(m => m.id !== id);
            renderMappings();
        }

        function clearMappings() {
            state.mappings = [];
            renderMappings();
        }

        // Clipboard
        function handleCopyConfig() {
            if (state.mappings.length === 0) return;
            const configToSave = state.mappings.map(({ source, target, sourceType, targetType }) => ({ 
                source, target, sourceType: sourceType || 'unknown', targetType: targetType || 'unknown' 
            }));
            const textToCopy = JSON.stringify(configToSave, null, 2);
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                document.getElementById('copy-icon').setAttribute('data-lucide', 'check-circle-2');
                document.getElementById('copy-text').innerText = 'Copied!';
                lucide.createIcons();
                setTimeout(() => {
                    document.getElementById('copy-icon').setAttribute('data-lucide', 'copy');
                    document.getElementById('copy-text').innerText = 'Copy Config';
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                showToast("Failed to copy");
            }
            document.body.removeChild(textArea);
        }

        // Sandbox Engine
        function loadActiveConfigIntoSandbox() {
            const tree = {};
            state.mappings.forEach(conn => {
                const srcParts = conn.source.replace(/\[(\w+)\]/g, '.$1').split('.').filter(Boolean);
                let sourceExpr = 'backendData';
                srcParts.forEach(p => {
                    sourceExpr += isNaN(p) ? `?.${p}` : `?.[${p}]`;
                });

                const tgtParts = conn.target.replace(/\[(\w+)\]/g, '.$1').split('.').filter(Boolean);
                let current = tree;
                for (let i = 0; i < tgtParts.length - 1; i++) {
                    const key = tgtParts[i];
                    if (!current[key]) current[key] = isNaN(tgtParts[i + 1]) ? {} : [];
                    current = current[key];
                }
                current[tgtParts[tgtParts.length - 1]] = sourceExpr;
            });

            const stringifyTree = (obj, indent) => {
                if (Array.isArray(obj)) {
                    if (obj.length === 0) return '[]';
                    let str = '[\n';
                    for (let i = 0; i < obj.length; i++) {
                        str += `${indent}  `;
                        const item = obj[i];
                        if (item === undefined) str += 'null';
                        else if (typeof item === 'object' && item !== null) str += stringifyTree(item, indent + '  ');
                        else str += item; 
                        if (i < obj.length - 1) str += ',';
                        str += '\n';
                    }
                    str += `${indent}]`;
                    return str;
                } else {
                    const keys = Object.keys(obj);
                    if (keys.length === 0) return '{}';
                    let str = '{\n';
                    keys.forEach((k, i) => {
                        str += `${indent}  "${k}": `;
                        if (typeof obj[k] === 'object' && obj[k] !== null) {
                            str += stringifyTree(obj[k], indent + '  ');
                        } else {
                            str += obj[k];
                        }
                        if (i < keys.length - 1) str += ',';
                        str += '\n';
                    });
                    str += `${indent}}`;
                    return str;
                }
            };

            const objectStr = stringifyTree(tree, '  ');
            state.sandboxCode = `// ⚠️ Auto-generated from Visual Mappings\n// Edit this function to add advanced JS logic.\n\nfunction mapData(backendData) {\n  return ${objectStr.trim()};\n}\n\n// Execute the mapping against the inbound Source JSON\nreturn mapData(sourceData);`;
            
            els.sandboxCode.value = state.sandboxCode;
            els.sandboxCode.dispatchEvent(new Event('input')); // Trigger line number update
        }

        function handleSandboxRun() {
            try {
                const srcObj = JSON.parse(state.sourceJson);
                const runner = new Function('sourceData', state.sandboxCode);
                const outObj = runner(srcObj);
                
                els.testOutputJson.value = JSON.stringify(outObj, null, 2);
                const outLinesCount = els.testOutputJson.value.split('\n').length || 1;
                els.testOutputLines.innerHTML = Array.from({length: Math.max(outLinesCount, 1)}).map((_, i) => `<div>${i + 1}</div>`).join('');
            } catch (e) {
                showToast(`Sandbox Error: ${e.message}`);
            }
        }

        // --- Init Events ---
        document.querySelectorAll('#source-tabs .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab('source', btn.dataset.tab));
        });
        document.querySelectorAll('#target-tabs .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab('target', btn.dataset.tab));
        });
        document.querySelectorAll('#center-tabs .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab('center', btn.dataset.tab));
        });

        // Add synced scroll to readonly outputs
        els.outputJson.addEventListener('scroll', () => { els.outputLines.scrollTop = els.outputJson.scrollTop; });
        els.configJson.addEventListener('scroll', () => { els.configLines.scrollTop = els.configJson.scrollTop; });
        els.testOutputJson.addEventListener('scroll', () => { els.testOutputLines.scrollTop = els.testOutputJson.scrollTop; });

        // Initial setup
        lucide.createIcons();
    </script>
</body>
</html>
